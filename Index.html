<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
background:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover no-repeat;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

/* pantallas */

.screen{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

.active{
display:flex;
}

/* botones */

button{
padding:12px 28px;
border:none;
border-radius:25px;
background:#ff9ecb;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* flores fondo */

.flowers-background{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
overflow:hidden;
}

/* candado */

.lockbox{
position:relative;
z-index:2;
background:#ffd966;
padding:25px;
border-radius:16px;
color:black;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.lock{
font-size:70px;
transition:all .7s;
}

.lock.open{
transform:rotate(-20deg) scale(1.2);
}

/* inputs */

input{
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

/* lluvia matrix */

.matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
font-family:monospace;
z-index:3;
}

.code{
position:absolute;
color:#ff80c0;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>
</head>
