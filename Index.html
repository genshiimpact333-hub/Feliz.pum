<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para gre</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
background:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564") center/cover no-repeat;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

/* pantallas */

.screen{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
}

.active{
display:flex;
}

/* botones */

button{
padding:12px 28px;
border:none;
border-radius:25px;
background:#ff9ecb;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* flores */

.garden{
display:flex;
gap:20px;
margin-bottom:30px;
}

.flower{
width:90px;
height:90px;
object-fit:cover;
border-radius:50%;
animation:breeze 5s ease-in-out infinite;
transform-origin:bottom;
}

@keyframes breeze{
0%{transform:rotate(-4deg)}
50%{transform:rotate(4deg)}
100%{transform:rotate(-4deg)}
}

/* candado */

.lockbox{
background:#ffd966;
padding:25px;
border-radius:16px;
color:black;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.lock{
font-size:70px;
transition:all .7s;
}

.lock.open{
transform:rotate(-20deg) scale(1.2);
}

/* inputs */

input{
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

/* lluvia matrix */

.matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
font-family:monospace;
}

.code{
position:absolute;
color:#ff80c0;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>
</head>

<body>

<div id="screen1" class="screen active">

<h2>Tengo algo para ti</h2>
<button onclick="next(2)">Continuar</button>

</div>

<div id="screen2" class="screen">

<div class="garden">

<img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/4/40/Sunflower_sky_backdrop.jpg">
<img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/4/40/Sunflower_sky_backdrop.jpg">
<img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/4/40/Sunflower_sky_backdrop.jpg">
<img class="flower" src="https://upload.wikimedia.org/wikipedia/commons/4/40/Sunflower_sky_backdrop.jpg">

</div>

<div class="lockbox">

<div id="lock" class="lock">🔒</div>

<h3>pon tu cumpleaños</h3>

<input id="birthday" placeholder="15/03/2007">

<br>

<button onclick="checkBirthday()">Abrir</button>

<p id="error"></p>

</div>

</div>

<div id="screen3" class="screen">

<h2>Lista de deseos</h2>
<p>solo puedes pedir uno</p>

<input id="wish" placeholder="tu deseo">

<br>

<button onclick="sendWish()">Enviar</button>

</div>

<div id="screen4" class="screen">

<h1>feliz cumpleaños gre 🎂</h1>

<p>hice esta página para ti</p>
<p>espero que tengas un día bonito</p>

</div>

<div id="matrix" class="matrix"></div>

<script>

function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById("screen"+n).classList.add("active")
}

function checkBirthday(){

let b=document.getElementById("birthday").value

if(b==="15/03/2007"){

let lock=document.getElementById("lock")

lock.innerText="🔓"
lock.classList.add("open")

setTimeout(()=>{
next(3)
},800)

}else{

document.getElementById("error").innerText="creo k no es"

}

}

function sendWish(){

let w=document.getElementById("wish").value

if(w!==""){

next(4)

startMatrix()

}

}

function startMatrix(){

let m=document.getElementById("matrix")

for(let i=0;i<70;i++){

let d=document.createElement("div")

d.className="code"

d.innerText="010101 FELIZ CUMPLEAÑOS 101010"

d.style.left=Math.random()*100+"vw"

d.style.animationDuration=(4+Math.random()*4)+"s"

m.appendChild(d)

}

}

</script>

</body>
  </html>
